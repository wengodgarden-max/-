<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>决策炼金师 - 把你的判断力变成付费AI工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            max-height: 800px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 30px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-icon {
            font-size: 40px;
        }

        .header-text h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .header-text p {
            font-size: 14px;
            opacity: 0.9;
        }

        .progress-bar {
            display: flex;
            justify-content: space-between;
            padding: 20px 30px;
            background: #f8f9fa;
            border-bottom: 1px solid #e0e0e0;
        }

        .progress-step {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }

        .progress-circle {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #e0e0e0;
            color: #999;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 6px;
            transition: all 0.3s;
        }

        .progress-circle.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .progress-circle.completed {
            background: #4caf50;
            color: white;
        }

        .progress-label {
            font-size: 11px;
            color: #999;
            text-align: center;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            display: flex;
            gap: 12px;
            max-width: 85%;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .message.ai .avatar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .message.user .avatar {
            background: #e0e0e0;
        }

        .message-content {
            padding: 15px 18px;
            border-radius: 18px;
            line-height: 1.6;
            font-size: 15px;
        }

        .message.ai .message-content {
            background: #f0f4ff;
            color: #333;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 15px 18px;
            background: #f0f4ff;
            border-radius: 18px;
            width: fit-content;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            animation: typingBounce 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typingBounce {
            0%, 60%, 100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-8px);
            }
        }

        .input-container {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 12px;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        #userInput {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 15px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.3s;
        }

        #userInput:focus {
            border-color: #667eea;
        }

        #userInput:disabled {
            background: #f5f5f5;
            cursor: not-allowed;
        }

        .send-btn {
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn:hover:not(:disabled) {
            transform: scale(1.1);
        }

        .send-btn:disabled {
            background: #e0e0e0;
            cursor: not-allowed;
        }

        .result-panel {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin: 10px 0;
        }

        .result-panel h4 {
            color: #667eea;
            margin-bottom: 12px;
            font-size: 16px;
        }

        .result-content {
            background: white;
            padding: 15px;
            border-radius: 8px;
            line-height: 1.8;
            white-space: pre-wrap;
            font-size: 14px;
        }

        .final-prompt-box {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 20px;
            border-radius: 12px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.6;
            white-space: pre-wrap;
            overflow-x: auto;
            max-height: 400px;
            overflow-y: auto;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-success {
            background: #4caf50;
            color: white;
        }

        .mode-selector {
            padding: 30px;
            text-align: center;
        }

        .mode-selector h2 {
            font-size: 22px;
            margin-bottom: 20px;
            color: #333;
        }

        .mode-selector p {
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .mode-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .mode-btn {
            padding: 20px 40px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .mode-btn:hover {
            border-color: #667eea;
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }

        .mode-btn .icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .mode-btn .title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .mode-btn .desc {
            font-size: 13px;
            color: #999;
        }

        @media (max-width: 600px) {
            .container {
                height: 100vh;
                max-height: none;
                border-radius: 0;
            }
            
            .mode-buttons {
                flex-direction: column;
            }
            
            .mode-btn {
                padding: 15px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-icon">🔮</div>
            <div class="header-text">
                <h1>决策炼金坊</h1>
                <p>把你的判断力变成付费AI工具</p>
            </div>
        </div>

        <div class="progress-bar" id="progressBar" style="display: none;">
            <div class="progress-step">
                <div class="progress-circle active" id="step1">1</div>
                <span class="progress-label">锁定选题</span>
            </div>
            <div class="progress-step">
                <div class="progress-circle" id="step2">2</div>
                <span class="progress-label">拆解决策</span>
            </div>
            <div class="progress-step">
                <div class="progress-circle" id="step3">3</div>
                <span class="progress-label">结构化</span>
            </div>
            <div class="progress-step">
                <div class="progress-circle" id="step4">4</div>
                <span class="progress-label">封装工具</span>
            </div>
        </div>

        <!-- 模式选择页面 -->
        <div id="modeSelector" class="mode-selector">
            <h2>💎 欢迎来到决策炼金坊！</h2>
            <p>
                您的每一次成功决策，都是等待被提炼的黄金。<br>
                今天，我们将把您脑中的"隐性知识"变成一款能帮别人解决问题的AI工具！
            </p>
            <div class="mode-buttons">
                <div class="mode-btn" onclick="startChat('quick')">
                    <div class="icon">🚀</div>
                    <div class="title">快速模式</div>
                    <div class="desc">适合思路清晰的专家</div>
                </div>
                <div class="mode-btn" onclick="startChat('attachment')">
                    <div class="icon">📎</div>
                    <div class="title">附件模式</div>
                    <div class="desc">上传简历等辅助材料</div>
                </div>
            </div>
        </div>

        <!-- 聊天界面 -->
        <div id="chatContainer" class="chat-container" style="display: none;"></div>

        <!-- 输入区域 -->
        <div id="inputContainer" class="input-container" style="display: none;">
            <div class="input-wrapper">
                <input type="text" id="userInput" placeholder="输入您的回答..." />
            </div>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script>
        let sessionData = {
            sessionId: 'session_' + Date.now(),
            currentLevel: 0,
            level1Complete: false,
            level2Complete: false,
            level3Complete: false,
            level4Complete: false,
            messages: []
        };

        const API_BASE = window.location.origin;

        function startChat(mode) {
            document.getElementById('modeSelector').style.display = 'none';
            document.getElementById('progressBar').style.display = 'flex';
            document.getElementById('chatContainer').style.display = 'flex';
            document.getElementById('inputContainer').style.display = 'flex';

            // 让AI先说第一句话
            sendAIMessage(mode);
        }

        function addMessage(content, isUser = false) {
            const container = document.getElementById('chatContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'ai'}`;
            
            messageDiv.innerHTML = `
                <div class="avatar">${isUser ? '👤' : '🔮'}</div>
                <div class="message-content">${content}</div>
            `;
            
            container.appendChild(messageDiv);
            container.scrollTop = container.scrollHeight;
            
            sessionData.messages.push({
                role: isUser ? 'user' : 'assistant',
                content: content
            });
        }

        function showTyping() {
            const container = document.getElementById('chatContainer');
            const typingDiv = document.createElement('div');
            typingDiv.id = 'typingIndicator';
            typingDiv.className = 'message ai';
            typingDiv.innerHTML = `
                <div class="avatar">🔮</div>
                <div class="typing-indicator">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            `;
            container.appendChild(typingDiv);
            container.scrollTop = container.scrollHeight;
        }

        function hideTyping() {
            const typing = document.getElementById('typingIndicator');
            if (typing) typing.remove();
        }

        async function sendAIMessage(mode) {
            showTyping();
            disableInput();

            try {
                // 第一次调用，让AI做自我介绍并开始引导
                const initialPrompt = mode === 'quick' 
                    ? '用户选择了快速模式，请做自我介绍并开始引导第一关的问题。'
                    : '用户选择了附件模式，请做自我介绍，并告诉用户可以上传简历等材料。';

                const response = await fetch(`${API_BASE}/alchemist/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        message: initialPrompt,
                        session_id: sessionData.sessionId,
                        start_new: true
                    })
                });

                const data = await response.json();
                hideTyping();
                
                if (data.status === 'success') {
                    addMessage(data.message);
                    enableInput();
                } else {
                    addMessage('抱歉，出现了一些问题，请刷新页面重试。');
                }
            } catch (error) {
                hideTyping();
                console.error('Error:', error);
                // 如果API调用失败，使用本地模拟
                const welcomeMessage = getWelcomeMessage(mode);
                addMessage(welcomeMessage);
                enableInput();
            }
        }

        function getWelcomeMessage(mode) {
            if (mode === 'quick') {
                return `🔮 **欢迎来到决策炼金坊！**

我是您的炼金师小智。您的每一次成功决策，都是等待被提炼的黄金！今天，我们将把您脑中的"隐性知识"变成一款能帮别人解决问题的AI工具——甚至可以收费哦！

---

💎 **第一关：锁定宝藏选题**

我们要找的选题，应该满足三个条件：
✅ 您有独特经验
✅ 别人有强烈需求  
✅ 能封装成工具

---

**问题1：您最擅长解决哪类问题？**

可以是工作中经常遇到的，也可以是别人经常向您请教的。请用一句话描述这个场景。

例如：
- "判断一个新渠道投放是否值得加码"
- "快速诊断系统故障根因"
- "评估一个产品功能该不该做"

请告诉我，您最擅长解决什么问题？`;
            } else {
                return `🔮 **欢迎来到决策炼金坊！**

我是您的炼金师小智。您的每一次成功决策，都是等待被提炼的黄金！

您选择了附件模式，可以上传您的简历、述职报告或KPI结果，我会帮您从这些材料中挖掘潜在的决策场景。

不过目前这个版本暂时只支持文字描述，您可以直接告诉我您的工作背景和专业领域，我们一起开始决策炼金之旅！

---

**问题1：您最擅长解决哪类问题？**

请告诉我您的工作领域，以及别人最常向您请教的问题是什么？`;
            }
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            
            if (!message) return;

            // 显示用户消息
            addMessage(message, true);
            input.value = '';
            
            // 禁用输入
            disableInput();
            showTyping();

            try {
                const response = await fetch(`${API_BASE}/alchemist/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        message: message,
                        session_id: sessionData.sessionId
                    })
                });

                const data = await response.json();
                hideTyping();
                
                if (data.status === 'success') {
                    addMessage(data.message);
                    
                    // 检查是否完成某个关卡，更新进度
                    updateProgress(data.message);
                } else {
                    addMessage('抱歉，出现了一些问题，请重试。');
                }
            } catch (error) {
                hideTyping();
                console.error('Error:', error);
                // 本地模拟响应
                const localResponse = getLocalResponse(message);
                addMessage(localResponse);
            }

            enableInput();
            input.focus();
        }

        function getLocalResponse(userMessage) {
            // 简单的本地响应逻辑
            if (userMessage.includes('擅长') || userMessage.includes('问题')) {
                return `很好！您提到的"${userMessage.substring(0, 50)}..."是一个很好的切入点。

**问题2：谁最需要这个能力？**

描述一下目标用户——他们是什么岗位？什么经验水平？在什么情况下会用到？

例如：
- "刚入职的投放专员，每天面对数据报表不知道如何调整预算"
- "产品新人，不知道如何评估需求优先级"

请告诉我，谁最需要您这个能力？`;
            } else {
                return `感谢您的回答！您提到的内容很有价值。

让我们继续下一个问题。根据您的描述，我需要了解更多细节才能帮您提炼决策规则。

您能举个具体的例子吗？比如最近一次您做出这个决策时的具体情况。`;
            }
        }

        function updateProgress(message) {
            // 根据消息内容判断当前进度
            if (message.includes('第二关') || message.includes('关卡2')) {
                setProgress(2);
            } else if (message.includes('第三关') || message.includes('关卡3')) {
                setProgress(3);
            } else if (message.includes('第四关') || message.includes('关卡4') || message.includes('恭喜')) {
                setProgress(4);
            }
        }

        function setProgress(level) {
            for (let i = 1; i <= 4; i++) {
                const step = document.getElementById('step' + i);
                step.classList.remove('active', 'completed');
                
                if (i < level) {
                    step.classList.add('completed');
                } else if (i === level) {
                    step.classList.add('active');
                }
            }
        }

        function disableInput() {
            document.getElementById('userInput').disabled = true;
            document.getElementById('sendBtn').disabled = true;
        }

        function enableInput() {
            document.getElementById('userInput').disabled = false;
            document.getElementById('sendBtn').disabled = false;
        }

        // 回车发送
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('userInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    sendMessage();
                }
            });
        });

        function showFinalResult(prompt) {
            const container = document.getElementById('chatContainer');
            
            const resultDiv = document.createElement('div');
            resultDiv.className = 'result-panel';
            resultDiv.innerHTML = `
                <h4>🎉 恭喜！您获得了【完整AI工具提示词】！</h4>
                <div class="final-prompt-box">${prompt}</div>
                <div class="action-buttons">
                    <button class="btn btn-success" onclick="copyPrompt()">📋 复制提示词</button>
                    <button class="btn btn-primary" onclick="location.reload()">🔄 重新开始</button>
                </div>
            `;
            
            container.appendChild(resultDiv);
            container.scrollTop = container.scrollHeight;
        }

        function copyPrompt() {
            const promptBox = document.querySelector('.final-prompt-box');
            if (promptBox) {
                navigator.clipboard.writeText(promptBox.textContent).then(() => {
                    alert('✅ 已复制到剪贴板！');
                }).catch(err => {
                    alert('复制失败，请手动选择复制');
                });
            }
        }
    </script>
</body>
</html>
