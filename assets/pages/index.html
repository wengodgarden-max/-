<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>炼金师助手 - 把你的判断力变成付费AI工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            height: 95vh;
            height: 95dvh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .header-icon {
            font-size: 32px;
        }

        .header-text h1 {
            font-size: 20px;
            margin-bottom: 3px;
        }

        .header-text p {
            font-size: 12px;
            opacity: 0.9;
        }

        .progress-bar {
            display: flex;
            justify-content: space-between;
            padding: 15px 20px;
            background: #f8f9fa;
            border-bottom: 1px solid #e0e0e0;
            flex-shrink: 0;
        }

        .progress-step {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }

        .progress-circle {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #e0e0e0;
            color: #999;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 4px;
            transition: all 0.3s;
        }

        .progress-circle.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .progress-circle.completed {
            background: #4caf50;
            color: white;
        }

        .progress-label {
            font-size: 10px;
            color: #999;
            text-align: center;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            -webkit-overflow-scrolling: touch;
        }

        .message {
            display: flex;
            gap: 10px;
            max-width: 90%;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .message.ai .avatar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .message.user .avatar {
            background: #e0e0e0;
        }

        .message-content {
            padding: 12px 16px;
            border-radius: 16px;
            line-height: 1.7;
            font-size: 15px;
        }

        .message.ai .message-content {
            background: #f0f4ff;
            color: #333;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .message-content ul {
            margin: 8px 0;
            padding-left: 18px;
        }

        .message-content li {
            margin: 6px 0;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: #f0f4ff;
            border-radius: 16px;
            width: fit-content;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            animation: typingBounce 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typingBounce {
            0%, 60%, 100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-6px);
            }
        }

        .input-container {
            padding: 12px 15px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex-shrink: 0;
        }

        .input-row {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        #userInput {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 22px;
            font-size: 16px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.3s;
            resize: none;
            max-height: 100px;
            min-height: 44px;
        }

        #userInput:focus {
            border-color: #667eea;
        }

        #userInput:disabled {
            background: #f5f5f5;
            cursor: not-allowed;
        }

        .voice-btn {
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 22px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .voice-btn.recording {
            background: #f44336;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
        }

        .voice-btn:hover:not(:disabled) {
            transform: scale(1.05);
        }

        .voice-btn:disabled {
            background: #e0e0e0;
            cursor: not-allowed;
        }

        .send-btn {
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .send-btn:hover:not(:disabled) {
            transform: scale(1.05);
        }

        .send-btn:disabled {
            background: #e0e0e0;
            cursor: not-allowed;
        }

        .mode-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .mode-btn {
            padding: 12px 24px;
            border: 2px solid #667eea;
            border-radius: 12px;
            background: white;
            color: #667eea;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .mode-btn:hover {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
        }

        .hidden {
            display: none !important;
        }

        .voice-hint {
            text-align: center;
            font-size: 12px;
            color: #999;
            padding: 5px;
        }

        .voice-hint.recording {
            color: #f44336;
            font-weight: bold;
        }

        @media (max-width: 600px) {
            .container {
                height: 100vh;
                height: 100dvh;
                max-height: none;
                border-radius: 0;
            }
            
            .mode-buttons {
                flex-direction: column;
            }
            
            .mode-btn {
                width: 100%;
                justify-content: center;
            }

            .header-text h1 {
                font-size: 18px;
            }
        }

        /* 安全区域适配 */
        @supports (padding-bottom: env(safe-area-inset-bottom)) {
            .input-container {
                padding-bottom: calc(12px + env(safe-area-inset-bottom));
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-icon">🔮</div>
            <div class="header-text">
                <h1>炼金坊</h1>
                <p>把你的判断力变成付费AI工具</p>
            </div>
        </div>

        <div class="progress-bar hidden" id="progressBar">
            <div class="progress-step">
                <div class="progress-circle active" id="step1">1</div>
                <span class="progress-label">锁定选题</span>
            </div>
            <div class="progress-step">
                <div class="progress-circle" id="step2">2</div>
                <span class="progress-label">拆解决策</span>
            </div>
            <div class="progress-step">
                <div class="progress-circle" id="step3">3</div>
                <span class="progress-label">结构化</span>
            </div>
            <div class="progress-step">
                <div class="progress-circle" id="step4">4</div>
                <span class="progress-label">封装工具</span>
            </div>
        </div>

        <!-- 聊天界面 -->
        <div id="chatContainer" class="chat-container"></div>

        <!-- 输入区域 -->
        <div id="inputContainer" class="input-container hidden">
            <div class="voice-hint" id="voiceHint">按住语音按钮说话，松开发送</div>
            <div class="input-row">
                <button class="voice-btn" id="voiceBtn" ontouchstart="startRecording(event)" ontouchend="stopRecording(event)" onmousedown="startRecording(event)" onmouseup="stopRecording(event)">
                    🎤
                </button>
                <div class="input-wrapper">
                    <input type="text" id="userInput" placeholder="输入或语音输入..." autocomplete="off" />
                </div>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                    ➤
                </button>
            </div>
        </div>
    </div>

    <script>
        let sessionData = {
            sessionId: 'session_' + Date.now(),
            currentLevel: 0,
            mode: null,
            messages: []
        };

        // 获取当前页面的主机地址
        const API_BASE = window.location.origin;

        // 语音识别相关
        let recognition = null;
        let isRecording = false;
        let finalTranscript = '';

        // 页面加载后，AI先打招呼
        window.onload = function() {
            initSpeechRecognition();
            showWelcomeMessage();
        };

        // 初始化语音识别
        function initSpeechRecognition() {
            if ('webkitSpeechRecognition' in window) {
                recognition = new webkitSpeechRecognition();
                recognition.continuous = false;
                recognition.interimResults = true;
                recognition.lang = 'zh-CN';

                recognition.onstart = function() {
                    isRecording = true;
                    document.getElementById('voiceBtn').classList.add('recording');
                    document.getElementById('voiceHint').textContent = '正在聆听...';
                    document.getElementById('voiceHint').classList.add('recording');
                };

                recognition.onresult = function(event) {
                    let interimTranscript = '';
                    for (let i = event.resultIndex; i < event.results.length; i++) {
                        const transcript = event.results[i][0].transcript;
                        if (event.results[i].isFinal) {
                            finalTranscript += transcript;
                        } else {
                            interimTranscript += transcript;
                        }
                    }
                    document.getElementById('userInput').value = finalTranscript + interimTranscript;
                };

                recognition.onend = function() {
                    isRecording = false;
                    document.getElementById('voiceBtn').classList.remove('recording');
                    document.getElementById('voiceHint').textContent = '按住语音按钮说话，松开发送';
                    document.getElementById('voiceHint').classList.remove('recording');
                    
                    // 如果有内容，自动发送
                    if (finalTranscript.trim()) {
                        sendMessage();
                        finalTranscript = '';
                    }
                };

                recognition.onerror = function(event) {
                    console.error('Speech recognition error:', event.error);
                    isRecording = false;
                    document.getElementById('voiceBtn').classList.remove('recording');
                    document.getElementById('voiceHint').textContent = '语音识别出错，请重试';
                    document.getElementById('voiceHint').classList.remove('recording');
                    finalTranscript = '';
                };
            } else {
                document.getElementById('voiceHint').textContent = '您的浏览器不支持语音输入';
                document.getElementById('voiceBtn').disabled = true;
            }
        }

        function startRecording(event) {
            event.preventDefault();
            if (recognition && !isRecording) {
                finalTranscript = '';
                recognition.start();
            }
        }

        function stopRecording(event) {
            event.preventDefault();
            if (recognition && isRecording) {
                recognition.stop();
            }
        }

        function showWelcomeMessage() {
            const welcomeMessage = `🔮 **欢迎来到炼金坊！**

我是炼金师小智。您的每一次成功决策，都是等待被提炼的黄金。今天，我们将把您脑中的 "隐性知识" 变成一款能帮别人解决问题的 AI 工具 —— 甚至可以收费哦！

全程大约 20-30 分钟。您可以选择：

**快速模式**：直接回答几个问题（适合思路清晰的专家）

**附件模式**：上传您的简历、述职报告或 KPI 结果，我来帮您挖掘潜在选题

💡 这个过程会帮您：
✅ 找到您最擅长、最有价值的决策场景
✅ 拆解您的思考过程，让它变得可复制
✅ 把经验变成清晰的决策规则
✅ 生成可以直接使用的 AI 提示词`;

            addMessage(welcomeMessage);
            
            // 显示模式选择按钮
            showModeButtons();
        }

        function showModeButtons() {
            const container = document.getElementById('chatContainer');
            
            const buttonsDiv = document.createElement('div');
            buttonsDiv.id = 'modeButtonsDiv';
            buttonsDiv.className = 'message ai';
            buttonsDiv.innerHTML = `
                <div class="avatar">🔮</div>
                <div class="mode-buttons" style="background: #f0f4ff; padding: 12px; border-radius: 16px;">
                    <button class="mode-btn" onclick="selectMode('quick')">🚀 快速模式</button>
                    <button class="mode-btn" onclick="selectMode('assisted')">📎 附件模式</button>
                </div>
            `;
            
            container.appendChild(buttonsDiv);
            container.scrollTop = container.scrollHeight;
        }

        function selectMode(mode) {
            // 移除模式选择按钮
            const modeButtons = document.getElementById('modeButtonsDiv');
            if (modeButtons) modeButtons.remove();
            
            sessionData.mode = mode;
            
            // 显示用户选择
            const modeText = mode === 'quick' ? '快速模式' : '附件模式';
            addMessage(`我选择 ${modeText}`, true);
            
            // 显示进度条和输入框
            document.getElementById('progressBar').classList.remove('hidden');
            document.getElementById('inputContainer').classList.remove('hidden');
            
            // 调用API获取AI响应
            sendAIMessage(mode);
        }

        function addMessage(content, isUser = false) {
            const container = document.getElementById('chatContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'ai'}`;
            
            // 支持Markdown格式（简单处理）
            const formattedContent = formatMessage(content);
            
            messageDiv.innerHTML = `
                <div class="avatar">${isUser ? '👤' : '🔮'}</div>
                <div class="message-content">${formattedContent}</div>
            `;
            
            container.appendChild(messageDiv);
            container.scrollTop = container.scrollHeight;
            
            sessionData.messages.push({
                role: isUser ? 'user' : 'assistant',
                content: content
            });
        }

        function formatMessage(text) {
            // 简单的Markdown格式化
            return text
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n\n/g, '</p><p>')
                .replace(/\n/g, '<br>')
                .replace(/^/, '<p>')
                .replace(/$/, '</p>');
        }

        function showTyping() {
            const container = document.getElementById('chatContainer');
            const typingDiv = document.createElement('div');
            typingDiv.id = 'typingIndicator';
            typingDiv.className = 'message ai';
            typingDiv.innerHTML = `
                <div class="avatar">🔮</div>
                <div class="typing-indicator">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            `;
            container.appendChild(typingDiv);
            container.scrollTop = container.scrollHeight;
        }

        function hideTyping() {
            const typing = document.getElementById('typingIndicator');
            if (typing) typing.remove();
        }

        async function sendAIMessage(mode) {
            showTyping();
            disableInput();

            try {
                const prompt = mode === 'quick' 
                    ? '用户选择了快速模式，请开始引导第一关的问题，直接提问用户最擅长解决什么问题。'
                    : '用户选择了附件模式，请开始引导，先询问用户的职业背景和工作年限。';

                const response = await fetch(`${API_BASE}/alchemist/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        message: prompt,
                        session_id: sessionData.sessionId,
                        mode: mode
                    })
                });

                const data = await response.json();
                hideTyping();
                
                if (data.status === 'success') {
                    addMessage(data.message);
                    enableInput();
                } else {
                    addMessage('抱歉，出现了一些问题，请刷新页面重试。');
                }
            } catch (error) {
                hideTyping();
                console.error('Error:', error);
                const localMessage = getLocalFirstQuestion(mode);
                addMessage(localMessage);
                enableInput();
            }
        }

        function getLocalFirstQuestion(mode) {
            if (mode === 'quick') {
                return `很好！让我们开始快速模式。

💎 **第一关：锁定宝藏选题**

**问题1：您最擅长解决哪类问题？**

可以是工作中经常遇到的，也可以是别人经常向您请教的。请用一句话描述这个场景。

例如：
- "判断一个新渠道投放是否值得加码"
- "快速诊断系统故障根因"
- "评估一个产品功能该不该做"

请告诉我，您最擅长解决什么问题？`;
            } else {
                return `很好！让我们开始附件模式。

💎 **第一关：锁定宝藏选题**

我会通过几个问题帮您深度挖掘潜在决策场景。

**问题1：请简单介绍一下您的职业背景**

- 您目前从事什么岗位？
- 在这个领域工作多少年了？
- 主要负责哪些方面的工作？

您可以简单描述，或者直接粘贴您的简历、项目总结等内容。`;
            }
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            
            if (!message) return;

            // 显示用户消息
            addMessage(message, true);
            input.value = '';
            finalTranscript = '';
            
            // 禁用输入
            disableInput();
            showTyping();

            try {
                const response = await fetch(`${API_BASE}/alchemist/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        message: message,
                        session_id: sessionData.sessionId,
                        mode: sessionData.mode
                    })
                });

                const data = await response.json();
                hideTyping();
                
                if (data.status === 'success') {
                    addMessage(data.message);
                    updateProgress(data.message);
                } else {
                    addMessage('抱歉，出现了一些问题，请重试。');
                }
            } catch (error) {
                hideTyping();
                console.error('Error:', error);
                const localResponse = getLocalResponse(message);
                addMessage(localResponse);
            }

            enableInput();
            input.focus();
        }

        function getLocalResponse(userMessage) {
            const msg = userMessage.toLowerCase();
            
            if (sessionData.mode === 'assisted') {
                if (msg.includes('年') || msg.includes('岗位') || msg.includes('负责')) {
                    return `很好！看到您的职业背景了。

**问题2：您最近一段工作中最重要的项目或成就是什么？**

请列举1-3个您最自豪的项目或成就，包括：
- 项目背景是什么
- 您在项目中的角色
- 取得了什么成果（最好有数据）

请告诉我您的成就！`;
                } else if (msg.includes('项目') || msg.includes('提升') || msg.includes('完成')) {
                    return `非常棒的成就！🎯

**问题3：您最常被请教的问题是什么？**

回想一下，同事或朋友经常向您请教哪类问题？`;
                } else {
                    return `感谢您的分享！

根据您提供的信息，您可能擅长某个领域的决策判断。请告诉我：

您一眼就能看穿、别人却觉得复杂的问题是什么？`;
                }
            } else {
                if (msg.includes('擅长') || msg.includes('问题') || msg.includes('判断')) {
                    return `很好！您提到的决策场景很有价值！

**问题2：谁最需要这个能力？**

描述一下目标用户：岗位、经验水平、使用场景。`;
                } else {
                    return `感谢您的回答！

**问题3：如果他们判断失误，会有什么后果？**

这个决策失误会造成什么损失？`;
                }
            }
        }

        function updateProgress(message) {
            if (message.includes('第二关') || message.includes('关卡2')) {
                setProgress(2);
            } else if (message.includes('第三关') || message.includes('关卡3')) {
                setProgress(3);
            } else if (message.includes('第四关') || message.includes('关卡4') || message.includes('恭喜')) {
                setProgress(4);
            }
        }

        function setProgress(level) {
            for (let i = 1; i <= 4; i++) {
                const step = document.getElementById('step' + i);
                step.classList.remove('active', 'completed');
                
                if (i < level) {
                    step.classList.add('completed');
                } else if (i === level) {
                    step.classList.add('active');
                }
            }
        }

        function disableInput() {
            document.getElementById('userInput').disabled = true;
            document.getElementById('sendBtn').disabled = true;
            document.getElementById('voiceBtn').disabled = true;
        }

        function enableInput() {
            document.getElementById('userInput').disabled = false;
            document.getElementById('sendBtn').disabled = false;
            document.getElementById('voiceBtn').disabled = false;
        }

        // 回车发送
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('userInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
        });
    </script>
</body>
</html>
