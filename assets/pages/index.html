<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>决策炼金师 - 把你的判断力变成付费AI工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            max-height: 800px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 30px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-icon {
            font-size: 40px;
        }

        .header-text h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .header-text p {
            font-size: 14px;
            opacity: 0.9;
        }

        .progress-bar {
            display: flex;
            justify-content: space-between;
            padding: 20px 30px;
            background: #f8f9fa;
            border-bottom: 1px solid #e0e0e0;
        }

        .progress-step {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }

        .progress-circle {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #e0e0e0;
            color: #999;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 6px;
            transition: all 0.3s;
        }

        .progress-circle.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .progress-circle.completed {
            background: #4caf50;
            color: white;
        }

        .progress-label {
            font-size: 11px;
            color: #999;
            text-align: center;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            display: flex;
            gap: 12px;
            max-width: 85%;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .message.ai .avatar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .message.user .avatar {
            background: #e0e0e0;
        }

        .message-content {
            padding: 15px 18px;
            border-radius: 18px;
            line-height: 1.6;
            font-size: 15px;
        }

        .message.ai .message-content {
            background: #f0f4ff;
            color: #333;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .message-content ul {
            margin: 10px 0;
            padding-left: 20px;
        }

        .message-content li {
            margin: 8px 0;
        }

        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 15px 18px;
            background: #f0f4ff;
            border-radius: 18px;
            width: fit-content;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            animation: typingBounce 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typingBounce {
            0%, 60%, 100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-8px);
            }
        }

        .input-container {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .input-row {
            display: flex;
            gap: 12px;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        #userInput {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 15px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.3s;
        }

        #userInput:focus {
            border-color: #667eea;
        }

        #userInput:disabled {
            background: #f5f5f5;
            cursor: not-allowed;
        }

        .send-btn {
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn:hover:not(:disabled) {
            transform: scale(1.1);
        }

        .send-btn:disabled {
            background: #e0e0e0;
            cursor: not-allowed;
        }

        .file-upload-btn {
            padding: 10px 20px;
            border: 2px dashed #667eea;
            border-radius: 8px;
            background: white;
            color: #667eea;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .file-upload-btn:hover {
            background: #f0f4ff;
        }

        .file-info {
            padding: 10px 15px;
            background: #e3f2fd;
            border-radius: 8px;
            font-size: 13px;
            color: #1976d2;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .file-remove-btn {
            margin-left: auto;
            background: none;
            border: none;
            color: #f44336;
            cursor: pointer;
            font-size: 18px;
        }

        .mode-selector {
            padding: 30px;
            text-align: center;
        }

        .mode-selector h2 {
            font-size: 22px;
            margin-bottom: 20px;
            color: #333;
        }

        .mode-selector p {
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .mode-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .mode-btn {
            padding: 20px 40px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .mode-btn:hover {
            border-color: #667eea;
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }

        .mode-btn .icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .mode-btn .title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .mode-btn .desc {
            font-size: 13px;
            color: #999;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 600px) {
            .container {
                height: 100vh;
                max-height: none;
                border-radius: 0;
            }
            
            .mode-buttons {
                flex-direction: column;
            }
            
            .mode-btn {
                padding: 15px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-icon">🔮</div>
            <div class="header-text">
                <h1>决策炼金坊</h1>
                <p>把你的判断力变成付费AI工具</p>
            </div>
        </div>

        <div class="progress-bar hidden" id="progressBar">
            <div class="progress-step">
                <div class="progress-circle active" id="step1">1</div>
                <span class="progress-label">锁定选题</span>
            </div>
            <div class="progress-step">
                <div class="progress-circle" id="step2">2</div>
                <span class="progress-label">拆解决策</span>
            </div>
            <div class="progress-step">
                <div class="progress-circle" id="step3">3</div>
                <span class="progress-label">结构化</span>
            </div>
            <div class="progress-step">
                <div class="progress-circle" id="step4">4</div>
                <span class="progress-label">封装工具</span>
            </div>
        </div>

        <!-- 模式选择页面 -->
        <div id="modeSelector" class="mode-selector">
            <h2>💎 欢迎来到决策炼金坊！</h2>
            <p>
                您的每一次成功决策，都是等待被提炼的黄金。<br>
                今天，我们将把您脑中的"隐性知识"变成一款能帮别人解决问题的AI工具！
            </p>
            <div class="mode-buttons">
                <div class="mode-btn" onclick="startChat('quick')">
                    <div class="icon">🚀</div>
                    <div class="title">快速模式</div>
                    <div class="desc">直接回答问题，适合思路清晰的专家</div>
                </div>
                <div class="mode-btn" onclick="startChat('assisted')">
                    <div class="icon">📎</div>
                    <div class="title">辅助模式</div>
                    <div class="desc">提供简历/项目总结，我来帮您深度挖掘</div>
                </div>
            </div>
        </div>

        <!-- 聊天界面 -->
        <div id="chatContainer" class="chat-container hidden"></div>

        <!-- 输入区域 -->
        <div id="inputContainer" class="input-container hidden">
            <div id="fileInfo" class="file-info hidden">
                <span>📎</span>
                <span id="fileName"></span>
                <button class="file-remove-btn" onclick="removeFile()">✕</button>
            </div>
            <div class="input-row">
                <div class="input-wrapper">
                    <input type="text" id="userInput" placeholder="输入您的回答..." />
                </div>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
            </div>
            <div id="uploadHint" class="hidden" style="text-align: center; color: #999; font-size: 13px;">
                💡 您也可以粘贴简历、项目总结等文字内容，或上传文档
                <input type="file" id="fileInput" style="display: none;" onchange="handleFileUpload(event)" />
            </div>
        </div>
    </div>

    <script>
        let sessionData = {
            sessionId: 'session_' + Date.now(),
            currentLevel: 0,
            mode: null,
            uploadedFile: null,
            messages: []
        };

        const API_BASE = window.location.origin;

        function startChat(mode) {
            sessionData.mode = mode;
            document.getElementById('modeSelector').classList.add('hidden');
            document.getElementById('progressBar').classList.remove('hidden');
            document.getElementById('chatContainer').classList.remove('hidden');
            document.getElementById('inputContainer').classList.remove('hidden');

            // 如果是辅助模式，显示上传提示
            if (mode === 'assisted') {
                document.getElementById('uploadHint').classList.remove('hidden');
            }

            // 让AI先说第一句话
            sendAIMessage(mode);
        }

        function addMessage(content, isUser = false) {
            const container = document.getElementById('chatContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'ai'}`;
            
            // 支持Markdown格式（简单处理）
            const formattedContent = formatMessage(content);
            
            messageDiv.innerHTML = `
                <div class="avatar">${isUser ? '👤' : '🔮'}</div>
                <div class="message-content">${formattedContent}</div>
            `;
            
            container.appendChild(messageDiv);
            container.scrollTop = container.scrollHeight;
            
            sessionData.messages.push({
                role: isUser ? 'user' : 'assistant',
                content: content
            });
        }

        function formatMessage(text) {
            // 简单的Markdown格式化
            return text
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n\n/g, '</p><p>')
                .replace(/\n/g, '<br>')
                .replace(/^/, '<p>')
                .replace(/$/, '</p>');
        }

        function showTyping() {
            const container = document.getElementById('chatContainer');
            const typingDiv = document.createElement('div');
            typingDiv.id = 'typingIndicator';
            typingDiv.className = 'message ai';
            typingDiv.innerHTML = `
                <div class="avatar">🔮</div>
                <div class="typing-indicator">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            `;
            container.appendChild(typingDiv);
            container.scrollTop = container.scrollHeight;
        }

        function hideTyping() {
            const typing = document.getElementById('typingIndicator');
            if (typing) typing.remove();
        }

        async function sendAIMessage(mode) {
            showTyping();
            disableInput();

            try {
                let initialPrompt = '';
                if (mode === 'quick') {
                    initialPrompt = '用户选择了快速模式，请开始引导第一关的问题，直接提问用户最擅长解决什么问题。';
                } else {
                    initialPrompt = '用户选择了辅助模式，请开始引导，先询问用户的职业背景和工作年限。';
                }

                const response = await fetch(`${API_BASE}/alchemist/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        message: initialPrompt,
                        session_id: sessionData.sessionId,
                        mode: mode
                    })
                });

                const data = await response.json();
                hideTyping();
                
                if (data.status === 'success') {
                    addMessage(data.message);
                    enableInput();
                } else {
                    addMessage('抱歉，出现了一些问题，请刷新页面重试。');
                }
            } catch (error) {
                hideTyping();
                console.error('Error:', error);
                // 如果API调用失败，使用本地模拟
                const welcomeMessage = getWelcomeMessage(mode);
                addMessage(welcomeMessage);
                enableInput();
            }
        }

        function getWelcomeMessage(mode) {
            if (mode === 'quick') {
                return `🔮 **欢迎来到决策炼金坊！**

我是您的炼金师小智。您的每一次成功决策，都是等待被提炼的黄金！今天，我们将把您脑中的"隐性知识"变成一款能帮别人解决问题的AI工具——甚至可以收费哦！

---

💎 **第一关：锁定宝藏选题**

我们要找的选题，应该满足三个条件：
✅ 您有独特经验
✅ 别人有强烈需求  
✅ 能封装成AI工具

---

**问题：您最擅长解决哪类问题？**

可以是工作中经常遇到的，也可以是别人经常向您请教的。请用一句话描述这个场景。

例如：
- "判断一个新渠道投放是否值得加码"
- "快速诊断系统故障根因"
- "评估一个产品功能该不该做"

请告诉我，您最擅长解决什么问题？`;
            } else {
                return `🔮 **欢迎来到决策炼金坊！**

我是您的炼金师小智。您的每一次成功决策，都是等待被提炼的黄金！

您选择了**辅助模式**，太好了！我会通过引导问题，帮您从工作经历中挖掘最有价值的决策场景。

---

💎 **第一关：锁定宝藏选题**

让我们先了解一下您的职业背景：

**问题1：请简单介绍一下您的职业背景**

- 您目前从事什么岗位？
- 在这个领域工作多少年了？
- 主要负责哪些方面的工作？

您可以简单描述，或者直接粘贴您的简历、项目总结等内容。`;
            }
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            
            if (!message) return;

            // 显示用户消息
            addMessage(message, true);
            input.value = '';
            
            // 禁用输入
            disableInput();
            showTyping();

            try {
                const response = await fetch(`${API_BASE}/alchemist/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        message: message,
                        session_id: sessionData.sessionId,
                        mode: sessionData.mode
                    })
                });

                const data = await response.json();
                hideTyping();
                
                if (data.status === 'success') {
                    addMessage(data.message);
                    updateProgress(data.message);
                } else {
                    addMessage('抱歉，出现了一些问题，请重试。');
                }
            } catch (error) {
                hideTyping();
                console.error('Error:', error);
                // 本地模拟响应
                const localResponse = getLocalResponse(message);
                addMessage(localResponse);
            }

            enableInput();
            input.focus();
        }

        function getLocalResponse(userMessage) {
            const msg = userMessage.toLowerCase();
            
            // 根据模式不同给予不同响应
            if (sessionData.mode === 'assisted') {
                if (msg.includes('年') || msg.includes('岗位') || msg.includes('负责')) {
                    return `很好！看到您的职业背景了。

接下来，让我们盘点一下您的工作成就：

**问题2：您最近一段工作中最重要的项目或成就是什么？**

请列举1-3个您最自豪的项目或成就，包括：
- 项目背景是什么
- 您在项目中的角色
- 取得了什么成果（最好有数据）

例如：
- "搭建会员体系，用户7日留存提升25%，付费率提升15%"
- "重构交易系统，系统响应时间从2秒降到200ms"

请告诉我您的成就！`;
                } else if (msg.includes('项目') || msg.includes('提升') || msg.includes('完成')) {
                    return `非常棒的成就！🎯

您提到的这些项目经验非常有价值。现在让我换个角度：

**问题3：您最常被请教的问题是什么？**

回想一下，同事或朋友经常向您请教哪类问题？
- 他们遇到什么困难时会想到您？
- 这些问题通常涉及什么场景？
- 您是如何帮助他们的？

这些"被请教的时刻"，往往就是最有价值的决策场景！`;
                } else {
                    return `感谢您的分享！这些信息很有价值。

根据您提供的信息，我帮您提炼一下潜在的决策场景：

您可能擅长：
1. 基于您的工作经验判断某些决策
2. 帮助他人解决类似的困惑

**接下来，我想了解：**

您一眼就能看穿、别人却觉得复杂的问题是什么？

比如在您的专业领域，有什么是新手容易犯错、但您一眼就能判断对错的场景？`;
                }
            } else {
                // 快速模式
                if (msg.includes('擅长') || msg.includes('问题') || msg.includes('判断')) {
                    return `很好！您提到的决策场景很有价值！

**问题2：谁最需要这个能力？**

描述一下目标用户：
- 他们是什么岗位？
- 什么经验水平？
- 在什么情况下会用到这个能力？

例如：
- "刚入职的投放专员，每天面对数据报表不知道如何调整预算"
- "产品新人，不知道如何评估需求优先级"

请告诉我，谁最需要您这个能力？`;
                } else {
                    return `感谢您的回答！您提到的内容很有价值。

**问题3：如果他们判断失误，会有什么后果？**

这个决策失误会造成什么损失？这能帮助我们验证这个场景的价值。

例如：
- "盲目加码导致预算浪费，或者错过优质渠道"
- "错误评估导致开发资源浪费，错失市场机会"

请告诉我，判断失误的后果是什么？`;
                }
            }
        }

        function updateProgress(message) {
            // 根据消息内容判断当前进度
            if (message.includes('第二关') || message.includes('关卡2')) {
                setProgress(2);
            } else if (message.includes('第三关') || message.includes('关卡3')) {
                setProgress(3);
            } else if (message.includes('第四关') || message.includes('关卡4') || message.includes('恭喜')) {
                setProgress(4);
            }
        }

        function setProgress(level) {
            for (let i = 1; i <= 4; i++) {
                const step = document.getElementById('step' + i);
                step.classList.remove('active', 'completed');
                
                if (i < level) {
                    step.classList.add('completed');
                } else if (i === level) {
                    step.classList.add('active');
                }
            }
        }

        function disableInput() {
            document.getElementById('userInput').disabled = true;
            document.getElementById('sendBtn').disabled = true;
        }

        function enableInput() {
            document.getElementById('userInput').disabled = false;
            document.getElementById('sendBtn').disabled = false;
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (file) {
                sessionData.uploadedFile = file;
                document.getElementById('fileName').textContent = file.name;
                document.getElementById('fileInfo').classList.remove('hidden');
            }
        }

        function removeFile() {
            sessionData.uploadedFile = null;
            document.getElementById('fileInput').value = '';
            document.getElementById('fileInfo').classList.add('hidden');
        }

        // 回车发送
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('userInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
        });
    </script>
</body>
</html>
