<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>炼金师助手 - 把你的经验变成你的知识商品</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --primary-color: #667eea;
            --secondary-color: #764ba2;
            --success-color: #4caf50;
            --warning-color: #ff9800;
            --danger-color: #f44336;
            --bg-light: #f8f9fa;
            --text-dark: #333;
            --text-gray: #666;
            --text-light: #999;
            --border-color: #e0e0e0;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--primary-gradient);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
        }

        .app-container {
            display: flex;
            width: 100%;
            height: 100vh;
            height: 100dvh;
        }

        /* 左侧导航栏 */
        .sidebar {
            width: 200px;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 20px 15px;
            background: var(--primary-gradient);
            color: white;
        }

        .sidebar-header h2 {
            font-size: 18px;
            margin-bottom: 3px;
        }

        .sidebar-header p {
            font-size: 11px;
            opacity: 0.8;
        }

        /* 导航按钮 */
        .nav-buttons {
            padding: 15px 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .nav-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px 10px;
            border: none;
            background: var(--bg-light);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            color: var(--text-gray);
        }

        .nav-btn:hover {
            background: rgba(102, 126, 234, 0.1);
        }

        .nav-btn.active {
            background: var(--primary-gradient);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .nav-btn-icon {
            font-size: 28px;
            margin-bottom: 6px;
        }

        .nav-btn-label {
            font-size: 12px;
            font-weight: 500;
        }

        .nav-btn.active .nav-btn-icon {
            transform: scale(1.1);
        }

        /* 页面容器 */
        .page-view {
            display: none;
            flex: 1;
            overflow: hidden;
        }

        .page-view.active {
            display: flex;
            flex-direction: column;
        }

        /* 数据页面通用样式 */
        .data-page {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .data-page-header {
            text-align: center;
            padding: 20px;
            color: white;
        }

        .data-page-header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .data-page-header p {
            font-size: 13px;
            opacity: 0.9;
        }

        /* 数据卡片 */
        .data-card {
            background: white;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .data-card-title {
            font-size: 13px;
            color: var(--text-light);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .data-card-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .data-item {
            text-align: center;
            padding: 12px 8px;
            background: var(--bg-light);
            border-radius: 12px;
        }

        .data-item-value {
            font-size: 22px;
            font-weight: bold;
            color: var(--text-dark);
            margin-bottom: 4px;
        }

        .data-item-label {
            font-size: 11px;
            color: var(--text-gray);
        }

        /* 漏斗图 */
        .funnel-card {
            background: white;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .funnel-item {
            margin-bottom: 12px;
        }

        .funnel-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
        }

        .funnel-label {
            font-size: 12px;
            color: var(--text-gray);
        }

        .funnel-value {
            font-size: 12px;
            font-weight: bold;
            color: var(--text-dark);
        }

        .funnel-bar {
            height: 6px;
            background: var(--bg-light);
            border-radius: 3px;
            overflow: hidden;
        }

        .funnel-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.5s ease;
        }

        .funnel-fill.stage-1 { background: var(--primary-gradient); }
        .funnel-fill.stage-2 { background: var(--success-color); }
        .funnel-fill.stage-3 { background: var(--warning-color); }
        .funnel-fill.stage-4 { background: var(--danger-color); }

        /* AI工具卡片 */
        .tool-card {
            background: white;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: all 0.3s;
        }

        .tool-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.2);
        }

        .tool-card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .tool-card-icon {
            font-size: 28px;
        }

        .tool-card-name {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-dark);
            flex: 1;
        }

        .tool-card-status {
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 10px;
        }

        .tool-card-status.active {
            background: rgba(76, 175, 80, 0.1);
            color: var(--success-color);
        }

        .tool-card-desc {
            font-size: 13px;
            color: var(--text-gray);
            line-height: 1.5;
            margin-bottom: 12px;
        }

        .tool-card-stats {
            display: flex;
            gap: 16px;
            font-size: 12px;
            color: var(--text-light);
        }

        .tool-card-stats span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: white;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .empty-state-text {
            font-size: 14px;
            opacity: 0.8;
        }

        .empty-state-hint {
            font-size: 12px;
            opacity: 0.6;
            margin-top: 8px;
        }

        /* 主内容区 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        /* 顶部导航 */
        .top-nav {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        .menu-toggle {
            display: none;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            padding: 5px;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-logo-icon {
            font-size: 28px;
        }

        .nav-logo-text {
            font-size: 18px;
            font-weight: bold;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* 内容容器 */
        .content-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
            overflow-y: auto;
        }

        /* 炼金主页 */
        .alchemist-page {
            width: 100%;
            max-width: 800px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            max-height: calc(100vh - 140px);
            max-height: calc(100dvh - 140px);
        }

        .page-header {
            background: var(--primary-gradient);
            color: white;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .page-header-icon {
            font-size: 32px;
        }

        .page-header-text h1 {
            font-size: 20px;
            margin-bottom: 3px;
        }

        .page-header-text p {
            font-size: 12px;
            opacity: 0.9;
        }

        .progress-bar {
            display: flex;
            justify-content: space-between;
            padding: 15px 20px;
            background: var(--bg-light);
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        .progress-step {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }

        .progress-circle {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--border-color);
            color: var(--text-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 4px;
            transition: all 0.3s;
        }

        .progress-circle.active {
            background: var(--primary-gradient);
            color: white;
        }

        .progress-circle.completed {
            background: var(--success-color);
            color: white;
        }

        .progress-label {
            font-size: 10px;
            color: var(--text-light);
            text-align: center;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            -webkit-overflow-scrolling: touch;
        }

        .message {
            display: flex;
            gap: 10px;
            max-width: 90%;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .message.ai .avatar {
            background: var(--primary-gradient);
        }

        .message.user .avatar {
            background: var(--border-color);
        }

        .message-content {
            padding: 12px 16px;
            border-radius: 16px;
            line-height: 1.7;
            font-size: 15px;
        }

        .message.ai .message-content {
            background: #f0f4ff;
            color: var(--text-dark);
        }

        .message.user .message-content {
            background: var(--primary-gradient);
            color: white;
        }

        .message-content ul {
            margin: 8px 0;
            padding-left: 18px;
        }

        .message-content li {
            margin: 6px 0;
        }

        /* Prompt输出框 */
        .prompt-output {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 15px;
            border-radius: 12px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 13px;
            line-height: 1.6;
            overflow-x: auto;
            white-space: pre-wrap;
            margin: 10px 0;
            max-height: 300px;
            overflow-y: auto;
        }

        .copy-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            margin-top: 10px;
            transition: all 0.3s;
        }

        .copy-btn:hover {
            background: var(--secondary-color);
        }

        /* 打赏区域 */
        .reward-section {
            background: linear-gradient(135deg, #fff5f5 0%, #fff0f6 100%);
            border: 2px dashed var(--danger-color);
            border-radius: 16px;
            padding: 20px;
            margin-top: 15px;
            text-align: center;
        }

        .reward-section h3 {
            color: var(--danger-color);
            margin-bottom: 15px;
            font-size: 16px;
        }

        .reward-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .reward-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .reward-btn.primary {
            background: var(--danger-color);
            color: white;
        }

        .reward-btn.secondary {
            background: white;
            color: var(--danger-color);
            border: 1px solid var(--danger-color);
        }

        .reward-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(244, 67, 54, 0.3);
        }

        .qr-upload {
            margin-top: 15px;
        }

        .qr-upload input[type="file"] {
            display: none;
        }

        .qr-preview {
            max-width: 200px;
            max-height: 200px;
            margin: 10px auto;
            border-radius: 8px;
            display: none;
        }

        .qr-preview.show {
            display: block;
        }

        /* 输入区域 */
        .input-container {
            padding: 12px 15px;
            background: white;
            border-top: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex-shrink: 0;
        }

        .input-row {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        #userInput {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border-color);
            border-radius: 22px;
            font-size: 16px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.3s;
            resize: none;
            max-height: 100px;
            min-height: 44px;
        }

        #userInput:focus {
            border-color: var(--primary-color);
        }

        #userInput:disabled {
            background: var(--bg-light);
            cursor: not-allowed;
        }

        .action-btn {
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 50%;
            background: var(--primary-gradient);
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .action-btn:hover:not(:disabled) {
            transform: scale(1.05);
        }

        .action-btn:disabled {
            background: var(--border-color);
            cursor: not-allowed;
        }

        .action-btn.recording {
            background: var(--danger-color);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .mode-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .mode-btn {
            padding: 12px 24px;
            border: 2px solid var(--primary-color);
            border-radius: 12px;
            background: white;
            color: var(--primary-color);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .mode-btn:hover {
            background: var(--primary-gradient);
            color: white;
            transform: translateY(-2px);
        }

        .hidden {
            display: none !important;
        }

        .voice-hint {
            text-align: center;
            font-size: 12px;
            color: var(--text-light);
            padding: 5px;
        }

        .voice-hint.recording {
            color: var(--danger-color);
            font-weight: bold;
        }

        /* 文件上传提示 */
        .file-upload-hint {
            background: #e8f5e9;
            border: 1px solid var(--success-color);
            border-radius: 8px;
            padding: 10px;
            margin: 10px 0;
            font-size: 13px;
            color: var(--text-gray);
        }

        .file-upload-hint .file-name {
            font-weight: bold;
            color: var(--success-color);
        }

        /* 响应式 */
        @media (max-width: 900px) {
            .sidebar {
                position: absolute;
                left: 0;
                top: 0;
                height: 100%;
                transform: translateX(-100%);
                z-index: 1000;
            }

            .sidebar.show {
                transform: translateX(0);
            }

            .menu-toggle {
                display: block;
            }

            .alchemist-page {
                max-height: calc(100vh - 100px);
                max-height: calc(100dvh - 100px);
            }
        }

        @media (max-width: 600px) {
            .content-wrapper {
                padding: 10px;
            }

            .alchemist-page {
                height: calc(100vh - 80px);
                height: calc(100dvh - 80px);
                max-height: none;
                border-radius: 0;
            }

            .mode-buttons {
                flex-direction: column;
            }

            .mode-btn {
                width: 100%;
                justify-content: center;
            }

            .page-header-text h1 {
                font-size: 18px;
            }

            .stat-card-value {
                font-size: 22px;
            }
        }

        /* 安全区域适配 */
        @supports (padding-bottom: env(safe-area-inset-bottom)) {
            .input-container {
                padding-bottom: calc(12px + env(safe-area-inset-bottom));
            }
        }

        /* 遮罩层 */
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
        }

        .overlay.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 左侧导航栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>🔮 炼金坊</h2>
                <p>知识变现工作台</p>
            </div>
            
            <div class="nav-buttons">
                <button class="nav-btn active" onclick="switchPage('home')">
                    <span class="nav-btn-icon">🧪</span>
                    <span class="nav-btn-label">炼金助手</span>
                </button>
                <button class="nav-btn" onclick="switchPage('platform')">
                    <span class="nav-btn-icon">📊</span>
                    <span class="nav-btn-label">平台数据</span>
                </button>
                <button class="nav-btn" onclick="switchPage('myworks')">
                    <span class="nav-btn-icon">🤖</span>
                    <span class="nav-btn-label">我的作品</span>
                </button>
            </div>
        </aside>

        <!-- 炼金助手主页 -->
        <div class="page-view active" id="homePage">
            <main class="main-content">
            <!-- 顶部导航 -->
            <nav class="top-nav">
                <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
                <div class="nav-logo">
                    <span class="nav-logo-icon">🔮</span>
                    <span class="nav-logo-text">炼金师助手</span>
                </div>
            </nav>

            <!-- 内容区 -->
            <div class="content-wrapper">
                <!-- 炼金主页 -->
                <div class="alchemist-page" id="alchemistPage">
                    <div class="page-header">
                        <div class="page-header-icon">🧪</div>
                        <div class="page-header-text">
                            <h1>炼金师助手</h1>
                            <p>把你的经验变成你的知识商品</p>
                        </div>
                    </div>

                    <div class="progress-bar hidden" id="progressBar">
                        <div class="progress-step">
                            <div class="progress-circle active" id="step1">1</div>
                            <span class="progress-label">锁定选题</span>
                        </div>
                        <div class="progress-step">
                            <div class="progress-circle" id="step2">2</div>
                            <span class="progress-label">拆解决策</span>
                        </div>
                        <div class="progress-step">
                            <div class="progress-circle" id="step3">3</div>
                            <span class="progress-label">结构化</span>
                        </div>
                        <div class="progress-step">
                            <div class="progress-circle" id="step4">4</div>
                            <span class="progress-label">专业确认</span>
                        </div>
                        <div class="progress-step">
                            <div class="progress-circle" id="step5">5</div>
                            <span class="progress-label">封装工具</span>
                        </div>
                        <div class="progress-step">
                            <div class="progress-circle" id="step6">6</div>
                            <span class="progress-label">商业化</span>
                        </div>
                    </div>

                    <!-- 聊天界面 -->
                    <div id="chatContainer" class="chat-container"></div>

                    <!-- 输入区域 -->
                    <div id="inputContainer" class="input-container hidden">
                        <div class="voice-hint" id="voiceHint">按住麦克风说话，松开发送 | 点击📎上传附件</div>
                        <div class="input-row">
                            <button class="action-btn" id="voiceBtn" ontouchstart="startRecording(event)" ontouchend="stopRecording(event)" onmousedown="startRecording(event)" onmouseup="stopRecording(event)">
                                🎤
                            </button>
                            <label class="action-btn" id="uploadBtn" style="cursor: pointer;">
                                📎
                                <input type="file" id="fileInput" accept=".pdf,.doc,.docx,.txt,.md" style="display: none;" onchange="handleFileUpload(event)">
                            </label>
                            <div class="input-wrapper">
                                <input type="text" id="userInput" placeholder="输入或语音输入..." autocomplete="off" />
                            </div>
                            <button class="action-btn" id="sendBtn" onclick="sendMessage()">
                                ➤
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
        </div>

        <!-- 平台数据页 -->
        <div class="page-view" id="platformPage">

                        <div class="funnel-bar">
                            <div class="funnel-fill stage-2" id="p_funnelTopicBar" style="width: 0%"></div>

                        <div class="funnel-header">

                            <div class="funnel-fill stage-3" id="p_funnelRulesBar" style="width: 0%"></div>
                        </div>
                    </div>
                    <div class="funnel-item">
                        <div class="funnel-header">
                            <span class="funnel-label">产出工具</span>
                            <span class="funnel-value" id="p_funnelOutput">0</span>
                        </div>
                        <div class="funnel-bar">
                            <div class="funnel-fill stage-4" id="p_funnelOutputBar" style="width: 0%"></div>
                        </div>
                    </div>
                </div>

                <!-- 商业化指标 -->
                <div class="data-card">
                    <div class="data-card-title">💰 商业化指标</div>
                    <div class="data-card-grid">
                        <div class="data-item">
                            <div class="data-item-value" id="p_rewardRate">0%</div>
                            <div class="data-item-label">打赏开通率</div>
                        </div>
                        <div class="data-item">
                            <div class="data-item-value" id="p_completeRate">0%</div>
                            <div class="data-item-label">完成率</div>

        <!-- 我的作品页 -->
        <div class="page-view" id="myWorksPage">
            <div class="data-page">
                <div class="data-page-header">
                    <h1>🤖 我的作品</h1>
                    <p>您创建的AI决策工具</p>
                </div>

                <div id="myToolsContainer">
                    <!-- 动态加载 -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // 会话数据
        let sessionData = {
            sessionId: 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9),
            currentLevel: 0,
            mode: null,
            messages: [],
            uploadedFile: null,
            completed: false,
            showReward: false,
            // 专家产出数据
            myTools: []
        };

        // API地址 - 使用后端服务器地址
        // 如果通过对象存储访问，需要指定后端服务器
        const API_BASE = window.location.hostname.includes('tos.coze.site') 
            ? 'https://507ced78-5ee2-494c-864f-94f2e1c835b5.dev.coze.site'  // 后端服务器地址
            : window.location.origin;  // 如果直接访问后端，使用当前域名

        // 语音识别相关
        let recognition = null;
        let isRecording = false;
        let finalTranscript = '';

        // 页面加载
        window.onload = function() {
            initSpeechRecognition();
            showWelcomeMessage();
            loadStatsData();
            loadMyTools();
            trackVisit();
        };

        // 切换页面
        function switchPage(page) {
            // 更新导航按钮状态
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            event.target.closest('.nav-btn').classList.add('active');
            
            // 隐藏所有页面
            document.querySelectorAll('.page-view').forEach(p => p.classList.remove('active'));
            
            // 显示对应页面
            if (page === 'home') {
                document.getElementById('homePage').classList.add('active');
            } else if (page === 'platform') {
                document.getElementById('platformPage').classList.add('active');
                loadPlatformData();
            } else if (page === 'myworks') {
                document.getElementById('myWorksPage').classList.add('active');
                loadMyWorks();
            }
        }

        // 加载平台数据
        function loadPlatformData() {
            fetch('/api/stats/data')
                .then(response => response.json())
                .then(data => {
                    if (data.error) return;
                    
                    // 更新核心指标
                    document.getElementById('p_totalVisits').textContent = formatNumber(data.totalVisits);
                    document.getElementById('p_todayVisits').textContent = formatNumber(data.todayVisits);
                    document.getElementById('p_totalUsers').textContent = formatNumber(data.totalUsers);
                    document.getElementById('p_todayUsers').textContent = formatNumber(data.todayUsers);
                    document.getElementById('p_totalOutputs').textContent = formatNumber(data.totalOutputs);
                    document.getElementById('p_todayOutputs').textContent = formatNumber(data.todayOutputs);
                    
                    // 更新漏斗
                    const total = Math.max(data.funnelStart, 1);
                    document.getElementById('p_funnelStart').textContent = formatNumber(data.funnelStart);
                    document.getElementById('p_funnelTopic').textContent = formatNumber(data.funnelTopic);
                    document.getElementById('p_funnelRules').textContent = formatNumber(data.funnelRules);
                    document.getElementById('p_funnelOutput').textContent = formatNumber(data.funnelOutput);
                    
                    document.getElementById('p_funnelTopicBar').style.width = Math.round(data.funnelTopic / total * 100) + '%';
                    document.getElementById('p_funnelRulesBar').style.width = Math.round(data.funnelRules / total * 100) + '%';
                    document.getElementById('p_funnelOutputBar').style.width = Math.round(data.funnelOutput / total * 100) + '%';
                    
                    // 更新商业化指标
                    document.getElementById('p_rewardRate').textContent = data.rewardRate + '%';
                    document.getElementById('p_completeRate').textContent = data.completeRate + '%';
                })
                .catch(e => console.log('Load platform data error:', e));
        }

        // 加载我的作品
        function loadMyWorks() {
            const tools = JSON.parse(localStorage.getItem('myAITools') || '[]');
            const container = document.getElementById('myToolsContainer');
            
            if (tools.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🤖</div>
                        <div class="empty-state-text">还没有创建任何AI工具</div>
                        <div class="empty-state-hint">点击"炼金助手"开始创建您的第一个AI决策工具</div>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = tools.map((tool, index) => `
                <div class="tool-card" onclick="viewTool(${index})">
                    <div class="tool-card-header">
                        <span class="tool-card-icon">${tool.icon || '🤖'}</span>
                        <span class="tool-card-name">${tool.name}</span>
                        <span class="tool-card-status active">已发布</span>
                    </div>
                    <div class="tool-card-desc">${tool.description || '暂无描述'}</div>
                    <div class="tool-card-stats">
                        <span>📅 ${tool.createTime || '刚刚'}</span>
                        <span>📋 ${tool.ruleCount || 0}条规则</span>
                        <span>👁️ ${tool.views || 0}次使用</span>
                    </div>
                </div>
            `).join('');
        }

        // 查看工具详情
        function viewTool(index) {
            const tools = JSON.parse(localStorage.getItem('myAITools') || '[]');
            const tool = tools[index];
            if (tool && tool.prompt) {
                alert('AI工具提示词：\n\n' + tool.prompt);
            }
        }

        // 加载我的工具列表
        function loadMyTools() {
            const tools = JSON.parse(localStorage.getItem('myAITools') || '[]');
            sessionData.myTools = tools;
            renderMyTools();
        }

        // 渲染我的工具
        function renderMyTools() {
            const container = document.getElementById('aiToolList');
            document.getElementById('toolCount').textContent = sessionData.myTools.length;
            
            if (sessionData.myTools.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🤖</div>
                        <div class="empty-state-text">还没有产出AI工具<br>完成炼金后这里会展示</div>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = sessionData.myTools.map((tool, index) => `
                <div class="ai-tool-card" onclick="viewTool(${index})">
                    <div class="ai-tool-header">
                        <span class="ai-tool-icon">${tool.icon || '🤖'}</span>
                        <span class="ai-tool-name">${tool.name}</span>
                        <span class="ai-tool-status ${tool.status || 'active'}">${tool.status === 'draft' ? '草稿' : '已发布'}</span>
                    </div>
                    <div class="ai-tool-desc">${tool.description}</div>
                    <div class="ai-tool-stats">
                        <span>👁️ ${tool.views || 0}</span>
                        <span>💬 ${tool.uses || 0}</span>
                        <span>💝 ${tool.rewards || 0}</span>
                    </div>
                </div>
            `).join('');
        }

        // 保存工具
        function saveTool(toolData) {
            const tools = JSON.parse(localStorage.getItem('myAITools') || '[]');
            toolData.id = Date.now();
            toolData.createdAt = new Date().toISOString();
            toolData.views = 0;
            toolData.uses = 0;
            toolData.rewards = 0;
            toolData.status = 'active';
            tools.unshift(toolData);
            localStorage.setItem('myAITools', JSON.stringify(tools));
            sessionData.myTools = tools;
            renderMyTools();
        }

        // 访问统计
        function trackVisit() {
            fetch(`${API_BASE}/api/stats/visit`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    sessionId: sessionData.sessionId,
                    referrer: document.referrer,
                    userAgent: navigator.userAgent
                })
            }).catch(() => {});
        }

        // 加载统计数据
        async function loadStatsData() {
            try {
                const response = await fetch(`${API_BASE}/api/stats/data`);
                const data = await response.json();
                updateStatsUI(data);
            } catch (e) {
                console.log('Using default stats data');
            }
        }

        // 更新统计UI
        function updateStatsUI(data) {
            if (data.totalVisits) document.getElementById('totalVisits').textContent = formatNumber(data.totalVisits);
            if (data.todayVisits) document.getElementById('todayVisits').textContent = formatNumber(data.todayVisits);
            if (data.weekVisits) document.getElementById('weekVisits').textContent = formatNumber(data.weekVisits);
            if (data.totalUsers) document.getElementById('totalUsers').textContent = formatNumber(data.totalUsers);
            if (data.todayUsers) document.getElementById('todayUsers').textContent = formatNumber(data.todayUsers);
            if (data.returningUsers) document.getElementById('returningUsers').textContent = formatNumber(data.returningUsers);
            if (data.totalOutputs) document.getElementById('totalOutputs').textContent = formatNumber(data.totalOutputs);
            if (data.todayOutputs) document.getElementById('todayOutputs').textContent = formatNumber(data.todayOutputs);
        }

        function formatNumber(num) {
            if (num >= 1000) {
                return (num / 1000).toFixed(1) + 'k';
            }
            return num.toString();
        }

        // 切换侧边栏
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            sidebar.classList.toggle('show');
            overlay.classList.toggle('show');
        }

        // 初始化语音识别
        function initSpeechRecognition() {
            if ('webkitSpeechRecognition' in window) {
                recognition = new webkitSpeechRecognition();
                recognition.continuous = false;
                recognition.interimResults = true;
                recognition.lang = 'zh-CN';

                recognition.onstart = function() {
                    isRecording = true;
                    document.getElementById('voiceBtn').classList.add('recording');
                    document.getElementById('voiceHint').textContent = '🎙️ 正在聆听...';
                    document.getElementById('voiceHint').classList.add('recording');
                };

                recognition.onresult = function(event) {
                    let interimTranscript = '';
                    for (let i = event.resultIndex; i < event.results.length; i++) {
                        const transcript = event.results[i][0].transcript;
                        if (event.results[i].isFinal) {
                            finalTranscript += transcript;
                        } else {
                            interimTranscript += transcript;
                        }
                    }
                    document.getElementById('userInput').value = finalTranscript + interimTranscript;
                };

                recognition.onend = function() {
                    isRecording = false;
                    document.getElementById('voiceBtn').classList.remove('recording');
                    document.getElementById('voiceHint').textContent = '按住麦克风说话，松开发送 | 点击📎上传附件';
                    document.getElementById('voiceHint').classList.remove('recording');
                    
                    if (finalTranscript.trim()) {
                        sendMessage();
                        finalTranscript = '';
                    }
                };

                recognition.onerror = function(event) {
                    console.error('Speech recognition error:', event.error);
                    isRecording = false;
                    document.getElementById('voiceBtn').classList.remove('recording');
                    document.getElementById('voiceHint').textContent = '语音识别出错，请重试';
                    document.getElementById('voiceHint').classList.remove('recording');
                    finalTranscript = '';
                };
            } else {
                document.getElementById('voiceHint').textContent = '您的浏览器不支持语音输入';
                document.getElementById('voiceBtn').disabled = true;
            }
        }

        function startRecording(event) {
            event.preventDefault();
            if (recognition && !isRecording) {
                finalTranscript = '';
                recognition.start();
            }
        }

        function stopRecording(event) {
            event.preventDefault();
            if (recognition && isRecording) {
                recognition.stop();
            }
        }

        // 文件上传处理
        async function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const validTypes = ['application/pdf', 'application/msword', 'application/vnd.openxmlformats-officedocument.wordprocessingml.document', 'text/plain', 'text/markdown'];
            if (!validTypes.includes(file.type) && !file.name.match(/\.(pdf|doc|docx|txt|md)$/i)) {
                addMessage('⚠️ 暂不支持该文件格式，请上传 PDF、Word、TXT 或 Markdown 文件。', false);
                return;
            }

            if (file.size > 10 * 1024 * 1024) {
                addMessage('⚠️ 文件大小不能超过 10MB', false);
                return;
            }

            sessionData.uploadedFile = file;
            
            const fileHint = document.createElement('div');
            fileHint.className = 'file-upload-hint';
            fileHint.innerHTML = `📎 已上传文件：<span class="file-name">${file.name}</span>（${(file.size / 1024).toFixed(1)}KB）`;
            
            const container = document.getElementById('chatContainer');
            container.appendChild(fileHint);
            container.scrollTop = container.scrollHeight;

            addMessage(`我上传了文件：${file.name}`, true);

            if (!sessionData.mode) {
                selectMode('assisted');
            } else {
                await sendFileToBackend(file);
            }
        }

        // 发送文件到后端
        async function sendFileToBackend(file) {
            showTyping();
            disableInput();

            try {
                const formData = new FormData();
                formData.append('file', file);
                formData.append('session_id', sessionData.sessionId);
                formData.append('mode', sessionData.mode);

                const response = await fetch(`${API_BASE}/alchemist/upload`, {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();
                hideTyping();

                if (data.status === 'success') {
                    addMessage(data.message);
                    updateProgress(data.message);
                } else {
                    addMessage('文件处理失败，请重试或直接描述您的情况。');
                }
            } catch (error) {
                hideTyping();
                console.error('Error:', error);
                addMessage('文件上传遇到问题，您可以先直接告诉我您的背景情况。');
            }

            enableInput();
        }

        // 显示欢迎消息
        function showWelcomeMessage() {
            const welcomeMessage = `🔮 **欢迎来到炼金师助手！**

我是炼金师小智。您的每一次成功决策、每一条宝贵经验，都是等待被提炼的黄金。

今天，我可以帮您实现以下目标：

**请选择您的目标模式：**

🤖 **模式一：做一个Agent**
适合：想把自己的判断逻辑变成AI工具（如：简历筛选Agent、投资决策Agent、面试评估Agent等）

📚 **模式二：做一门课程**
适合：想把自己的专业知识变成课程大纲或PPT（如：新员工培训、技能分享、知识传承等）

💡 **两种模式的区别：**
- Agent更强调"判断"（输入信息 → 输出结论和建议）
- 课程更强调"教会"（让学员学会并应用）`;

            addMessage(welcomeMessage);
            showMainModeButtons();
        }

        // 显示主模式选择按钮（Agent/课程）
        function showMainModeButtons() {
            const container = document.getElementById('chatContainer');
            
            const buttonsDiv = document.createElement('div');
            buttonsDiv.id = 'modeButtonsDiv';
            buttonsDiv.className = 'message ai';
            buttonsDiv.innerHTML = `
                <div class="avatar">🔮</div>
                <div class="mode-buttons" style="background: #f0f4ff; padding: 12px; border-radius: 16px;">
                    <button class="mode-btn" onclick="selectMainMode('agent')">🤖 做一个Agent</button>
                    <button class="mode-btn" onclick="selectMainMode('course')">📚 做一门课程</button>
                </div>
            `;
            
            container.appendChild(buttonsDiv);
            container.scrollTop = container.scrollHeight;
        }

        // 选择主模式（Agent/课程）
        function selectMainMode(mainMode) {
            const modeButtons = document.getElementById('modeButtonsDiv');
            if (modeButtons) modeButtons.remove();
            
            sessionData.mainMode = mainMode;
            
            // 显示用户选择
            const modeText = mainMode === 'agent' ? '🤖 做一个Agent' : '📚 做一门课程';
            addMessage(modeText, true);
            
            // 显示子模式选择
            showSubModeButtons(mainMode);
        }

        // 显示子模式选择按钮（快速/附件）
        function showSubModeButtons(mainMode) {
            const container = document.getElementById('chatContainer');
            
            const message = mainMode === 'agent' 
                ? `太好了！我们来做Agent。\n\n您可以选择：\n\n⚡ **快速模式**：直接回答几个问题（适合思路清晰的专家）\n\n📎 **附件模式**：上传您的简历、述职报告或 KPI 结果，我来帮您挖掘潜在选题`
                : `太棒了！我们来做课程。\n\n课程开发分为5个关卡，全程大约 15-20 分钟：\n\n📍 **关卡1：课程定位** - 明确谁学、学什么、为什么学\n📍 **关卡2：内容萃取** - 挖掘您的工作步骤、方法工具、挑战窍门\n📍 **关卡3：大纲设计** - 选择适合的课程逻辑结构\n📍 **关卡4：内容确认** - 确认课程框架完整性\n📍 **关卡5：产出交付** - 选择产出物（课题/大纲/PPT）\n\n您可以选择：\n\n⚡ **快速模式**：直接回答问题（适合已明确课程主题）\n\n📎 **附件模式**：上传您的培训资料、工作手册或案例文档，我来帮您梳理课程结构`;
            
            addMessage(message);
            
            const buttonsDiv = document.createElement('div');
            buttonsDiv.id = 'subModeButtonsDiv';
            buttonsDiv.className = 'message ai';
            buttonsDiv.innerHTML = `
                <div class="avatar">🔮</div>
                <div class="mode-buttons" style="background: #f0f4ff; padding: 12px; border-radius: 16px;">
                    <button class="mode-btn" onclick="selectSubMode('quick')">🚀 快速模式</button>
                    <button class="mode-btn" onclick="selectSubMode('assisted')">📎 附件模式</button>
                </div>
            `;
            
            container.appendChild(buttonsDiv);
            container.scrollTop = container.scrollHeight;
        }

        // 选择子模式（快速/附件）
        function selectSubMode(subMode) {
            const subModeButtons = document.getElementById('subModeButtonsDiv');
            if (subModeButtons) subModeButtons.remove();
            
            sessionData.mode = subMode;
            
            const modeText = subMode === 'quick' ? '⚡ 快速模式' : '📎 附件模式';
            addMessage(modeText, true);
            
            document.getElementById('progressBar').classList.remove('hidden');
            document.getElementById('inputContainer').classList.remove('hidden');
            
            // 根据主模式更新进度条标签
            updateProgressLabels(sessionData.mainMode);
            
            // 记录漏斗：开始炼金
            trackFunnel('start');
            
            // 发送模式选择消息
            sendAIMessage(`${sessionData.mainMode}_${subMode}`);
        }

        // 更新进度条标签
        function updateProgressLabels(mainMode) {
            const labels = mainMode === 'course' 
                ? ['课程定位', '内容萃取', '大纲设计', '内容确认', '产出交付', '商业化']
                : ['锁定选题', '拆解决策', '结构化', '专业确认', '封装工具', '商业化'];
            
            document.querySelectorAll('.progress-label').forEach((el, index) => {
                if (labels[index]) {
                    el.textContent = labels[index];
                }
            });
        }

        // 选择模式（兼容旧代码）
        function selectMode(mode) {
            sessionData.mode = mode;
            sessionData.mainMode = 'agent'; // 默认为agent模式
            
            const modeText = mode === 'quick' ? '快速模式' : '附件模式';
            
            document.getElementById('progressBar').classList.remove('hidden');
            document.getElementById('inputContainer').classList.remove('hidden');
            
            trackFunnel('start');
            sendAIMessage(mode);
        }

        // 添加消息
        function addMessage(content, isUser = false) {
            const container = document.getElementById('chatContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'ai'}`;
            
            let formattedContent = formatMessage(content);
            
            if (content.includes('```prompt') || content.includes('```markdown')) {
                formattedContent = formatPromptOutput(content);
            }
            
            if (content.includes('🎉') && content.includes('恭喜') && !sessionData.showReward) {
                sessionData.completed = true;
                sessionData.showReward = true;
                trackComplete();
            }
            
            messageDiv.innerHTML = `
                <div class="avatar">${isUser ? '👤' : '🔮'}</div>
                <div class="message-content">${formattedContent}</div>
            `;
            
            container.appendChild(messageDiv);
            container.scrollTop = container.scrollHeight;
            
            sessionData.messages.push({
                role: isUser ? 'user' : 'assistant',
                content: content
            });

            if (sessionData.showReward && !document.getElementById('rewardSection')) {
                setTimeout(() => addRewardSection(), 500);
            }
        }

        // 格式化Prompt输出
        function formatPromptOutput(text) {
            const codeBlockRegex = /```(?:prompt|markdown)?\n?([\s\S]*?)```/g;
            let result = text;
            let match;
            
            while ((match = codeBlockRegex.exec(text)) !== null) {
                const codeContent = match[1];
                const replacement = `
                    <div class="prompt-output">${escapeHtml(codeContent.trim())}</div>
                    <button class="copy-btn" onclick="copyPrompt(this)">📋 复制Prompt</button>
                `;
                result = result.replace(match[0], replacement);
            }
            
            return formatMessage(result);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 复制Prompt
        function copyPrompt(btn) {
            const promptDiv = btn.previousElementSibling;
            const text = promptDiv.textContent;
            
            navigator.clipboard.writeText(text).then(() => {
                const originalText = btn.textContent;
                btn.textContent = '✅ 已复制！';
                btn.disabled = true;
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.disabled = false;
                }, 2000);
            });
        }

        // 添加打赏区域
        function addRewardSection() {
            const container = document.getElementById('chatContainer');
            
            const rewardDiv = document.createElement('div');
            rewardDiv.id = 'rewardSection';
            rewardDiv.className = 'message ai';
            rewardDiv.innerHTML = `
                <div class="avatar">💝</div>
                <div class="reward-section">
                    <h3>💝 开通用户打赏功能</h3>
                    <p style="font-size: 13px; color: #666; margin-bottom: 15px;">
                        您的AI工具已经可以对外服务了！开通打赏功能，让受益者可以感谢您的智慧结晶。
                    </p>
                    <div class="reward-buttons">
                        <button class="reward-btn primary" onclick="showQRUpload()">📷 上传收款二维码</button>
                        <button class="reward-btn secondary" onclick="skipReward()">暂不开启</button>
                    </div>
                    <div class="qr-upload" id="qrUpload" style="display: none;">
                        <input type="file" id="qrInput" accept="image/*" onchange="handleQRUpload(event)">
                        <label for="qrInput" class="reward-btn primary" style="display: inline-block; margin-top: 10px;">
                            选择图片
                        </label>
                        <img id="qrPreview" class="qr-preview" alt="收款码预览">
                    </div>
                </div>
            `;
            
            container.appendChild(rewardDiv);
            container.scrollTop = container.scrollHeight;
        }

        // 显示二维码上传
        function showQRUpload() {
            document.getElementById('qrUpload').style.display = 'block';
        }

        // 跳过打赏
        function skipReward() {
            sessionData.showReward = false;
            const rewardSection = document.getElementById('rewardSection');
            if (rewardSection) {
                rewardSection.remove();
            }
            addMessage('好的，您可以随时在个人中心开通打赏功能。祝您的AI工具大受欢迎！🌟');
        }

        // 处理二维码上传
        async function handleQRUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const preview = document.getElementById('qrPreview');
                preview.src = e.target.result;
                preview.classList.add('show');
                
                uploadQRCode(file);
            };
            reader.readAsDataURL(file);
        }

        // 上传收款码
        async function uploadQRCode(file) {
            const formData = new FormData();
            formData.append('qr_code', file);
            formData.append('session_id', sessionData.sessionId);

            try {
                const response = await fetch(`${API_BASE}/alchemist/reward`, {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();
                if (data.status === 'success') {
                    addMessage('✅ 打赏功能已开通！您的用户现在可以通过扫码打赏来感谢您的智慧分享了！💝');
                    trackRewardEnabled();
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        // 统计完成
        function trackComplete() {
            fetch(`${API_BASE}/api/stats/complete`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    sessionId: sessionData.sessionId,
                    mode: sessionData.mode
                })
            }).catch(() => {});
        }

        // 统计打赏开通
        function trackRewardEnabled() {
            fetch(`${API_BASE}/api/stats/reward`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    sessionId: sessionData.sessionId
                })
            }).catch(() => {});
        }

        // 格式化消息
        function formatMessage(text) {
            return text
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n\n/g, '</p><p>')
                .replace(/\n/g, '<br>')
                .replace(/^/, '<p>')
                .replace(/$/, '</p>');
        }

        // 显示输入中
        function showTyping() {
            const container = document.getElementById('chatContainer');
            const typingDiv = document.createElement('div');
            typingDiv.id = 'typingIndicator';
            typingDiv.className = 'message ai';
            typingDiv.innerHTML = `
                <div class="avatar">🔮</div>
                <div class="typing-indicator" style="display: flex; gap: 4px; padding: 12px 16px; background: #f0f4ff; border-radius: 16px;">
                    <div style="width: 8px; height: 8px; background: #667eea; border-radius: 50%; animation: typingBounce 1.4s infinite;"></div>
                    <div style="width: 8px; height: 8px; background: #667eea; border-radius: 50%; animation: typingBounce 1.4s infinite; animation-delay: 0.2s;"></div>
                    <div style="width: 8px; height: 8px; background: #667eea; border-radius: 50%; animation: typingBounce 1.4s infinite; animation-delay: 0.4s;"></div>
                </div>
            `;
            container.appendChild(typingDiv);
            container.scrollTop = container.scrollHeight;
        }

        function hideTyping() {
            const typing = document.getElementById('typingIndicator');
            if (typing) typing.remove();
        }

        // 发送AI消息
        async function sendAIMessage(mode) {
            showTyping();
            disableInput();

            try {
                // 先显示用户选择
                const modeText = mode === 'quick' ? '快速模式' : '附件模式';
                addMessage(`我选择 ${modeText}`, true);

                // 使用自然的对话方式
                const prompt = `我选择${modeText}，请开始引导我`;

                console.log('Sending mode selection:', prompt);

                const response = await fetch(`${API_BASE}/alchemist/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: prompt,
                        session_id: sessionData.sessionId,
                        mode: sessionData.mode,
                        messages: sessionData.messages
                    })
                });

                console.log('Response status:', response.status);

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                console.log('Response data:', data);
                
                hideTyping();
                
                if (data.status === 'success') {
                    addMessage(data.message);
                    enableInput();
                } else {
                    console.error('API returned error:', data);
                    addMessage('抱歉，出现了一些问题，请刷新页面重试。');
                }
            } catch (error) {
                hideTyping();
                console.error('API call failed:', error);
                addMessage('⚠️ 网络连接出现问题，请刷新页面重试。\n\n错误信息: ' + error.message);
            }
            
            enableInput();
        }

        // 本地首问
        function getLocalFirstQuestion(mode) {
            if (mode === 'quick') {
                return `很好！让我们开始快速模式。

💎 **第一关：锁定宝藏选题**

**问题1：您最擅长解决哪类问题？**

可以是工作中经常遇到的，也可以是别人经常向您请教的。请用一句话描述这个场景。

例如：
- "判断一个新渠道投放是否值得加码"
- "快速诊断系统故障根因"
- "评估一个产品功能该不该做"

请告诉我，您最擅长解决什么问题？`;
            } else {
                return `很好！让我们开始附件模式。

💎 **第一关：锁定宝藏选题**

我会通过几个问题帮您深度挖掘潜在决策场景。

**问题1：请简单介绍一下您的职业背景**

- 您目前从事什么岗位？
- 在这个领域工作多少年了？
- 主要负责哪些方面的工作？

您可以简单描述，或者直接上传您的简历、项目总结等文件。`;
            }
        }

        // 发送消息
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            
            if (!message) return;

            addMessage(message, true);
            input.value = '';
            finalTranscript = '';
            
            disableInput();
            showTyping();

            try {
                console.log('Sending message:', message);
                console.log('Messages history:', sessionData.messages);
                
                const response = await fetch(`${API_BASE}/alchemist/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: message,
                        session_id: sessionData.sessionId,
                        mode: sessionData.mode,
                        messages: sessionData.messages
                    })
                });

                console.log('Response status:', response.status);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                console.log('Response data:', data);
                
                hideTyping();
                
                if (data.status === 'success') {
                    addMessage(data.message);
                    updateProgress(data.message);
                } else {
                    console.error('API returned error:', data);
                    addMessage('抱歉，出现了一些问题，请重试。');
                }
            } catch (error) {
                hideTyping();
                console.error('API call failed:', error);
                // 不使用本地响应，而是提示用户重试
                addMessage('⚠️ 网络连接出现问题，请刷新页面重试。\n\n错误信息: ' + error.message);
            }

            enableInput();
            document.getElementById('userInput').focus();
        }

        // 本地响应
        function getLocalResponse(userMessage) {
            const msg = userMessage.toLowerCase();
            
            if (sessionData.mode === 'assisted') {
                if (msg.includes('年') || msg.includes('岗位') || msg.includes('负责')) {
                    return `很好！看到您的职业背景了。

**问题2：您最近一段工作中最重要的项目或成就是什么？**

请列举1-3个您最自豪的项目或成就，包括：
- 项目背景是什么
- 您在项目中的角色
- 取得了什么成果（最好有数据）

请告诉我您的成就！`;
                } else if (msg.includes('项目') || msg.includes('提升') || msg.includes('完成')) {
                    return `非常棒的成就！🎯

**问题3：您最常被请教的问题是什么？**

回想一下，同事或朋友经常向您请教哪类问题？`;
                } else {
                    return `感谢您的分享！

根据您提供的信息，您可能擅长某个领域的决策判断。请告诉我：

您一眼就能看穿、别人却觉得复杂的问题是什么？`;
                }
            } else {
                if (msg.includes('擅长') || msg.includes('问题') || msg.includes('判断')) {
                    return `很好！您提到的决策场景很有价值！

**问题2：谁最需要这个能力？**

描述一下目标用户：岗位、经验水平、使用场景。`;
                } else {
                    return `感谢您的回答！

**问题3：如果他们判断失误，会有什么后果？**

这个决策失误会造成什么损失？`;
                }
            }
        }

        // 更新进度
        function updateProgress(message) {
            if (message.includes('第二关') || message.includes('关卡2')) {
                setProgress(2);
                trackFunnel('topic');
            } else if (message.includes('第三关') || message.includes('关卡3')) {
                setProgress(3);
                trackFunnel('rules');
            } else if (message.includes('第四关') || message.includes('关卡4') || message.includes('专业确认') || message.includes('确认产出')) {
                setProgress(4);
            } else if (message.includes('第五关') || message.includes('关卡5') || message.includes('封装确认') || message.includes('Prompt')) {
                setProgress(5);
            } else if (message.includes('第六关') || message.includes('关卡6') || message.includes('商业化') || message.includes('打赏')) {
                setProgress(6);
                trackFunnel('output');
            }
        }
        
        // 记录漏斗阶段
        function trackFunnel(stage) {
            fetch('/api/stats/funnel', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({stage: stage})
            }).catch(e => console.log('Track funnel error:', e));
            
            // 刷新统计数据
            setTimeout(loadStatsData, 500);
        }

        function setProgress(level) {
            for (let i = 1; i <= 6; i++) {
                const step = document.getElementById('step' + i);
                step.classList.remove('active', 'completed');
                
                if (i < level) {
                    step.classList.add('completed');
                } else if (i === level) {
                    step.classList.add('active');
                }
            }
        }

        function disableInput() {
            document.getElementById('userInput').disabled = true;
            document.getElementById('sendBtn').disabled = true;
            document.getElementById('voiceBtn').disabled = true;
            document.getElementById('uploadBtn').style.pointerEvents = 'none';
        }

        function enableInput() {
            document.getElementById('userInput').disabled = false;
            document.getElementById('sendBtn').disabled = false;
            document.getElementById('voiceBtn').disabled = false;
            document.getElementById('uploadBtn').style.pointerEvents = 'auto';
        }

        // 回车发送
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('userInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
            
            // 初始化统计数据
            initStats();
        });
        
        // 初始化统计数据
        function initStats() {
            // 生成或获取sessionId
            let sessionId = localStorage.getItem('alchemist_session_id');
            if (!sessionId) {
                sessionId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                localStorage.setItem('alchemist_session_id', sessionId);
            }
            
            // 记录访问
            fetch('/api/stats/visit', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({sessionId: sessionId})
            }).catch(e => console.log('Track visit error:', e));
            
            // 获取并更新统计数据
            loadStatsData();
            
            // 每30秒刷新一次统计数据
            setInterval(loadStatsData, 30000);
        }
        
        // 加载统计数据
        function loadStatsData() {
            fetch('/api/stats/data')
                .then(response => response.json())
                .then(data => {
                    if (data.error) return;
                    
                    // 更新核心指标
                    document.getElementById('totalVisits').textContent = formatNumber(data.totalVisits);
                    document.getElementById('todayVisits').textContent = formatNumber(data.todayVisits);
                    document.getElementById('weekVisits').textContent = formatNumber(data.weekVisits);
                    
                    document.getElementById('totalUsers').textContent = formatNumber(data.totalUsers);
                    document.getElementById('todayUsers').textContent = formatNumber(data.todayUsers);
                    document.getElementById('returningUsers').textContent = formatNumber(data.returningUsers);
                    
                    document.getElementById('totalOutputs').textContent = formatNumber(data.totalOutputs);
                    document.getElementById('todayOutputs').textContent = formatNumber(data.todayOutputs);
                    
                    // 更新转化漏斗
                    const total = Math.max(data.funnelStart, 1);
                    updateFunnel('funnelStart', data.funnelStart, total, 100);
                    updateFunnel('funnelTopic', data.funnelTopic, total, 0);
                    updateFunnel('funnelRules', data.funnelRules, total, 0);
                    updateFunnel('funnelOutput', data.funnelOutput, total, 0);
                })
                .catch(e => console.log('Load stats error:', e));
        }
        
        // 更新漏斗图
        function updateFunnel(id, value, total, defaultPercent) {
            const el = document.getElementById(id);
            if (el) {
                el.textContent = formatNumber(value);
            }
            // 更新进度条
            const bar = el?.closest('.funnel-item')?.querySelector('.funnel-fill');
            if (bar) {
                const percent = total > 0 ? Math.round(value / total * 100) : defaultPercent;
                bar.style.width = percent + '%';
            }
        }
        
        // 格式化数字
        function formatNumber(num) {
            if (num >= 10000) {
                return (num / 10000).toFixed(1) + 'w';
            } else if (num >= 1000) {
                return (num / 1000).toFixed(1) + 'k';
            }
            return num || 0;
        }
        
        // 记录完成产出
        function trackComplete(mode) {
            const sessionId = localStorage.getItem('alchemist_session_id') || 'unknown';
            fetch('/api/stats/complete', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({sessionId: sessionId, mode: mode})
            }).catch(e => console.log('Track complete error:', e));
        }
        
        // 记录打赏开通
        function trackReward() {
            fetch('/api/stats/reward', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({})
            }).catch(e => console.log('Track reward error:', e));
        }
    </script>
</body>
</html>
